name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: python -m py_compile app.py core/*.py config/*.py

      - name: Run tests
        run: pytest

  deploy-hugging-face:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Hugging Face Hub CLI
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is not set. Add it in GitHub repository secrets to enable automatic deployment."
            exit 1
          fi
          huggingface-cli upload \
            pusakamediaid123/smart-content-purifier-summary-hub \
            . \
            --repo-type=space \
            --commit-message="Deploy from GitHub Actions"
